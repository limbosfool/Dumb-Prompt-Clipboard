<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Copy Board</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #121212; color: #fff; max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; color: #e0e0e0; margin-bottom: 20px; }
        .form-section { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 80px; resize: vertical; }
        .action-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .add-btn { background: #238636; color: white; }
        .add-btn:active { background: #2ea043; }
        .list-title { font-size: 18px; margin-bottom: 10px; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .item-container { display: flex; align-items: stretch; margin: 12px 0; background: #1e1e1e; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .copy-btn { flex-grow: 1; padding: 18px; background: none; color: #e0e0e0; border: none; text-align: left; font-size: 16px; cursor: pointer; font-weight: 500; }
        .copy-btn:active { background: #2a2a2a; }
        .edit-btn { background: #333; border: none; color: #ff9800; width: 50px; cursor: pointer; font-size: 16px; border-left: 1px solid #444; }
        .delete-btn { background: #333; border: none; color: #f44336; width: 50px; cursor: pointer; font-size: 16px; border-left: 1px solid #444; }
        .toast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #4caf50; color: white; padding: 12px 24px; border-radius: 30px; font-weight: bold; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .hidden { display: none; }
        .sync-box { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-top: 30px; border: 1px solid #333; }
        .sync-input { font-size: 12px; font-family: monospace; background: #000; border: 1px solid #333; padding: 8px; color: #888; }
    </style>
</head>
<body>

    <h2>📋 Personal Copy Board</h2>

    <div class="form-section">
        <b id="form-mode-title">➕ Add New Button</b>
        <input type="hidden" id="edit-id">
        <input type="text" id="btn-label" placeholder="Button Label (e.g., My Address)">
        <textarea id="btn-text" placeholder="Paste the long text here..."></textarea>
        <button id="submit-btn" class="action-btn add-btn" onclick="saveButton()">Save Button</button>
        <button id="cancel-btn" class="action-btn hidden" onclick="resetForm()" style="background:#555; color:white; margin-top:5px;">Cancel</button>
    </div>

    <div class="list-title">Your Custom Buttons (A-Z)</div>
    <div id="buttons-list"></div>

    <!-- The direct cross-device synchronization engine -->
    <div class="sync-box">
        <b style="color: #aaa;">📲 Phone & Computer Link</b>
        <p style="font-size: 12px; color: #666; margin: 5px 0 10px 0;">To sync devices, copy the text below and paste it into the sync box on your other device, then click Import.</p>
        <textarea id="sync-data" class="sync-input" placeholder="Paste sync text here to import..."></textarea>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="action-btn" onclick="copySyncString()" style="background: #007bff; color: white; flex: 1; padding: 8px;">📋 Copy Sync Text</button>
            <button class="action-btn" onclick="importSyncString()" style="background: #333; color: #e0e0e0; flex: 1; padding: 8px; border: 1px solid #444;">📥 Import</button>
        </div>
    </div>

    <div id="toast" class="toast">Copied!</div>

    <script>
        let buttons = JSON.parse(localStorage.getItem('myFixedClipboardList')) || [];
        function renderButtons() {
            buttons.sort((a, b) => a.label.localeCompare(b.label, undefined, { sensitivity: 'base', numeric: true }));
            localStorage.setItem('myFixedClipboardList', JSON.stringify(buttons));

            const list = document.getElementById('buttons-list');
            list.innerHTML = '';

            if (buttons.length === 0) {
                list.innerHTML = '<p style="color:#666; text-align:center;">No buttons added yet.</p>';
                document.getElementById('sync-data').value = '';
                return;
            }

            buttons.forEach((btn) => {
                const container = document.createElement('div');
                container.className = 'item-container';
                const safeId = encodeURIComponent(btn.label);

                container.innerHTML = `
                    <button class="copy-btn" onclick="copyText('${safeId}')">⚡ ${escapeHtml(btn.label)}</button>
                    <button class="edit-btn" onclick="startEdit('${safeId}')">✏️</button>
                    <button class="delete-btn" onclick="deleteButton('${safeId}')">🗑️</button>
                `;
                list.appendChild(container);
            });
            
            // Encode data array cleanly into text string
            document.getElementById('sync-data').value = btoa(encodeURIComponent(JSON.stringify(buttons)));
        }

        function saveButton() {
            const label = document.getElementById('btn-label').value.trim();
            const text = document.getElementById('btn-text').value.trim();
            const editId = document.getElementById('edit-id').value;

            if (!label || !text) return alert('Please fill in both fields!');

            if (editId === "") {
                const exists = buttons.some(b => b.label.toLowerCase() === label.toLowerCase());
                if (exists) return alert('A button with this label already exists!');
                buttons.push({ label, text });
            } else {
                const originalLabel = decodeURIComponent(editId);
                const index = buttons.findIndex(b => b.label === originalLabel);
                if (index !== -1) buttons[index] = { label, text };
            }

            resetForm();
            renderButtons();
        }

        function copySyncString() {
            const el = document.getElementById('sync-data');
            if (!el.value) return alert('Add some buttons first before copying sync data!');
            el.select();
            document.execCommand('copy');
            alert('Sync data copied! Paste this code into your other device and click Import.');
        }

        function importSyncString() {
            const el = document.getElementById('sync-data').value.trim();
            if (!el) return alert('Please paste the sync text from your other device first!');
            
            try {
                const decoded = JSON.parse(decodeURIComponent(atob(el)));
                if (Array.isArray(decoded)) {
                    if (confirm('Importing will override your current list. Continue?')) {
                        buttons = decoded;
                        renderButtons();
                        alert('Sync successful! Your board has updated.');
                    }
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert('Invalid sync code. Make sure you copied the entire line of text!');
            }
        }

        function startEdit(safeId) {
            const targetLabel = decodeURIComponent(safeId);
            const item = buttons.find(b => b.label === targetLabel);
            if (!item) return;

            document.getElementById('form-mode-title').innerText = "✏️ Edit Button";
            document.getElementById('btn-label').value = item.label;
            document.getElementById('btn-text').value = item.text;
            document.getElementById('edit-id').value = safeId;
            document.getElementById('cancel-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteButton(safeId) {
            const targetLabel = decodeURIComponent(safeId);
            if (confirm(`Delete "${targetLabel}" permanently?`)) {
                buttons = buttons.filter(b => b.label !== targetLabel);
                renderButtons();
            }
        }

        function resetForm() {
            document.getElementById('form-mode-title').innerText = "➕ Add New Button";
            document.getElementById('btn-label').value = '';
            document.getElementById('btn-text').value = '';
            document.getElementById('edit-id').value = '';
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        function copyText(safeId) {
            const targetLabel = decodeURIComponent(safeId);
            const item = buttons.find(b => b.label === targetLabel);
            if (!item) return;

            navigator.clipboard.writeText(item.text).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 1500);
            });
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        renderButtons();
    </script>
</body>
</html>
