<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Copy Board</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #121212; color: #fff; max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; color: #e0e0e0; margin-bottom: 20px; }
        .status-msg { text-align: center; color: #888; font-size: 14px; margin-bottom: 15px; }
        .list-title { font-size: 18px; margin-bottom: 10px; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .item-container { display: flex; align-items: stretch; margin: 12px 0; background: #1e1e1e; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .copy-btn { flex-grow: 1; padding: 18px; background: none; color: #e0e0e0; border: none; text-align: left; font-size: 16px; cursor: pointer; font-weight: 500; width: 100%; }
        .copy-btn:active { background: #2a2a2a; }
        .toast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #4caf50; color: white; padding: 12px 24px; border-radius: 30px; font-weight: bold; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <h2>📋 My Copy Board</h2>
    <div id="status" class="status-msg">Loading buttons from list.txt...</div>
    
    <div class="list-title">Your Custom Buttons (A-Z)</div>
    <div id="buttons-list"></div>

    <div id="toast" class="toast">Copied!</div>

    <script>
        async function fetchAndRender() {
            try {
                // Fetch the list.txt file directly from your GitHub directory
                const response = await fetch('list.txt?t=' + new Date().getTime());
                if (!response.ok) throw new Error("Could not find list.txt");
                
                const rawText = await response.text();
                const lines = rawText.split('\n');
                let buttons = [];

                lines.forEach(line => {
                    if (line.includes('|')) {
                        const parts = line.split('|');
                        const label = parts[0].trim();
                        const text = parts.slice(1).join('|').trim();
                        if (label && text) {
                            buttons.push({ label, text });
                        }
                    }
                });

                // Always enforce automatic A-Z alphabetical sorting
                buttons.sort((a, b) => a.label.localeCompare(b.label, undefined, { sensitivity: 'base', numeric: true }));

                const listDiv = document.getElementById('buttons-list');
                listDiv.innerHTML = buttons.length === 0 ? '<p style="color:#666; text-align:center;">No buttons found in list.txt.</p>' : '';

                buttons.forEach((btn, index) => {
                    const container = document.createElement('div');
                    container.className = 'item-container';
                    container.innerHTML = `<button class="copy-btn" id="btn-${index}">⚡ ${escapeHtml(btn.label)}</button>`;
                    listDiv.appendChild(container);

                    // Setup click action
                    document.getElementById(`btn-${index}`).addEventListener('click', () => {
                        navigator.clipboard.writeText(btn.text).then(() => {
                            const toast = document.getElementById('toast');
                            toast.style.display = 'block';
                            setTimeout(() => { toast.style.display = 'none'; }, 1500);
                        });
                    });
                });

                document.getElementById('status').innerText = "✅ Buttons loaded successfully";
            } catch (err) {
                document.getElementById('status').innerText = "❌ Error: Make sure list.txt exists on GitHub.";
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        fetchAndRender();
    </script>
</body>
</html>
